<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>VideoWall — JJ Smart Solutions</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
*{box-sizing:border-box}
body{background:#0d1117;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif;color:#e6edf3}
.login-card{background:#161b22;border:1px solid #30363d;border-radius:12px;width:360px;overflow:hidden}
.login-header{background:#0d1117;padding:2rem 2rem 1.5rem;text-align:center;border-bottom:1px solid #30363d}
.logo-text{font-size:1.5rem;font-weight:700;color:#58a6ff;letter-spacing:-.02em}
.logo-sub{font-size:.78rem;color:#8b949e;margin-top:.25rem}
.login-body{padding:1.8rem}
.form-control{background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:6px}
.form-control:focus{background:#0d1117;color:#e6edf3;border-color:#58a6ff;box-shadow:none}
.btn-login{background:#238636;border:none;width:100%;padding:.65rem;border-radius:6px;font-weight:600;color:#fff}
.btn-login:hover{background:#2ea043}
.footer-credit{font-size:.72rem;color:#484f58;text-align:center;margin-top:2rem}
.footer-credit a{color:#484f58;text-decoration:none}
.footer-credit a:hover{color:#8b949e}
label{color:#8b949e;font-size:.83rem;margin-bottom:.3rem;display:block}
.alert{font-size:.83rem;padding:.5rem .75rem;border-radius:6px}
</style>
</head>
<body>
<div class="login-card shadow-lg">
  <div class="login-header">
    <div class="logo-text">VideoWall</div>
    <div class="logo-sub">Security Camera Management</div>
  </div>
  <div class="login-body">
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="alert alert-danger mb-3">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <form method="post">
      <div class="mb-4">
        <label>Password</label>
        <input type="password" name="password" class="form-control" autofocus required>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>
</div>
<div class="footer-credit">
  &copy; {{ 2026 }} <a href="{{ COMPANY_URL }}" target="_blank">{{ COMPANY }}</a>
  &nbsp;&middot;&nbsp; Designed &amp; developed by {{ BUILT_BY }}
</div>
</body>
</html>
