<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VideoWall Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
body { background:#1a1a2e; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.card { background:#16213e; border:1px solid #0f3460; color:#eee; width:360px; }
.card-header { background:#0f3460; text-align:center; font-size:1.2rem; font-weight:bold; }
.form-control { background:#1a1a2e; color:#eee; border-color:#0f3460; }
.form-control:focus { background:#1a1a2e; color:#eee; border-color:#e94560; box-shadow:none; }
.btn-primary { background:#e94560; border-color:#e94560; }
.btn-primary:hover { background:#c73652; border-color:#c73652; }
</style>
</head>
<body>
<div class="card shadow-lg">
  <div class="card-header py-3">VideoWall Admin</div>
  <div class="card-body p-4">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger py-2">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
  </div>
</div>
</body>
</html>
